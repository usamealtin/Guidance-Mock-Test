 ,"Mock Test 4":[{"category":"Week 2 - Career Counseling Origins","text":"Frank Parsons is known as the \"Father of Guidance.\" Which of the following is NOT one of the three core factors in his early career-choice framework?","choices":["A) Self-understanding of aptitudes and limits","B) Knowledge of work requirements and compensation","C) Medical history and psychiatric evaluation","D) The matching relationship between self and work information"],"correct":2,"hint":"Parsons' model focuses strictly on self-knowledge, career information, and the logical fit between them."},{"category":"Week 2 - Counseling in Türkiye","text":"According to the historical timeline of the profession in Türkiye, where did counseling services initially start and develop during the 1950s?","choices":["A) In military bases","B) In schools and education centers","C) In private corporate offices","D) In hospitals"],"correct":1,"hint":"Counseling in Turkey started in schools, with the first psychological services center opening in a primary school in Ankara in 1955."},{"category":"Week 2 - Professional Identity Conflicts","text":"What is a major source of professional identity conflict for counselors working in Türkiye's schools today?","choices":["A) Counselors are legally not allowed to work in public schools.","B) Different organizations and ministries use conflicting titles like \"psychological counselor,\" \"counselor,\" and \"guidance teacher.\"","C) MONE only hires clinical psychologists.","D) There are no university programs for counseling in Türkiye."],"correct":1,"hint":"Titles and boundaries are contested among MONE, TPCGA, and TPA, complicating professional identity and causing turf issues."},{"category":"Week 3 - MONE Regulation","text":"According to MONE regulations, what is the primary purpose of the \"e-Guidance system\" (e-Rehberlik)?","choices":["A) To publicly share students' disciplinary records with the community.","B) To provide online therapy sessions directly to parents.","C) To run programs within a plan, report activities, and allow authorized staff to monitor them electronically.","D) To replace all face-to-face classroom teaching with digital modules."],"correct":2,"hint":"The e-Guidance system is a digital platform used to run, report, and monitor school counseling programs efficiently."},{"category":"Week 3 - Program Balance","text":"When planning a comprehensive school counseling program, what is a common dilemma regarding the balance of services?","choices":["A) Choosing between academic instruction and physical education.","B) Balancing proactive prevention programming with reactive intervention and responsive services, given limited resources.","C) Deciding whether to only serve gifted students or only students with disabilities.","D) Deciding whether to eliminate the principal from the Advisory Committee entirely."],"correct":1,"hint":"Many programs overemphasize intervention at the expense of prevention, making it hard to balance systemic leadership with necessary responsive services."},{"category":"Week 4 - Special Education Referral","text":"Before making a formal referral to the Guidance and Research Center (RAM) for special education evaluation, what is the school required to do?","choices":["A) Expel the student immediately to protect the classroom environment.","B) Document the student's needs, current educational performance, and what adaptations have already been tried in class.","C) Wait for the student to fail three consecutive grade levels.","D) Force the parents to hire a private shadow teacher at their own expense."],"correct":1,"hint":"Documentation helps show exactly what the school has observed and what adjustments have been tried, which strengthens the referral with clear evidence."},{"category":"Week 4 - Response to Intervention","text":"In the Response to Intervention (RtI) model, what does \"Tier 1\" represent?","choices":["A) Intensive, highly individualized support for a single student.","B) Small group targeted intervention provided by a specialist.","C) High-quality, research-based instruction provided in the core general education classroom to all students.","D) Permanent placement in a separate special education school."],"correct":2,"hint":"RtI begins with high-quality teaching for all students at Tier 1, and moves to more intensive supports only if students do not respond adequately to that core instruction."},{"category":"Week 4 - Teacher Responsibilities in Special Ed","text":"Which of the following is considered a core responsibility of a general education teacher regarding special education?","choices":["A) Independently writing the entire Individualized Education Program (BEP) alone.","B) Formally diagnosing autism spectrum disorder.","C) Implementing evidence-based day-to-day instruction and communicating with parents about strengths and needs.","D) Administering standardized intelligence (IQ) tests."],"correct":2,"hint":"General educators identify needs, provide evidence-based instruction, and collaborate, while specialists manage formal diagnoses and specialized assessments."},{"category":"Week 5 - ASD Accommodations","text":"Students with Autism Spectrum Disorder (ASD) often experience stress triggered by unpredictable routines or sensory input. What is a highly effective classroom accommodation for them?","choices":["A) Using clear, consistent routines and visual schedules rather than purely verbal prompts.","B) Forcing them into loud, crowded spaces to build tolerance.","C) Removing all academic and behavioral expectations permanently.","D) Changing the daily schedule unexpectedly to teach them how to be flexible."],"correct":0,"hint":"Students with ASD often succeed best in structured, predictable environments supported by visual schedules and clear routines to reduce unnecessary ambiguity."},{"category":"Week 5 - ADHD Supports","text":"Which environmental support is most appropriate for a student with ADHD?","choices":["A) Seating them in the most visually stimulating part of the room next to the door.","B) Providing long, unchunked tasks that take an hour to complete.","C) Reducing distractions, establishing stable routines, and providing seating that improves focus.","D) Giving behavioral feedback only at the end of the semester."],"correct":2,"hint":"Students with ADHD do best in organized, low-distraction environments with stable routines and strategic seating that helps them monitor their attention."},{"category":"Week 5 - Gifted Students","text":"What does \"Curriculum Compacting\" mean in the context of supporting gifted and talented students?","choices":["A) Forcing students to repeat material they already know perfectly.","B) Removing already-mastered content so they can focus on more challenging, deeper material.","C) Grouping all gifted students into a separate school building.","D) Giving gifted students the exact same tasks as everyone else, but with less time to finish."],"correct":1,"hint":"Compacting removes already-mastered content, which is a key differentiation strategy to support advanced learners and prevent boredom."},{"category":"Week 5 - Culturally Diverse Students","text":"Why might a student from a culturally and linguistically diverse background experience difficulty in a traditional school setting?","choices":["A) Because they inherently lack cognitive ability.","B) Because of language barriers, cultural mismatch with school expectations, or inequitable schooling practices.","C) Because they naturally do not care about academic success.","D) Because special education labels are automatically required by law for all bilingual students."],"correct":1,"hint":"School expectations are culturally shaped, and misunderstanding a student's cultural background can lead to biased interpretations of their behavior and participation."},{"category":"Week 6 - Test Selection","text":"When a school is evaluating the \"administrative conditions\" of a potential standardized test, what are they primarily checking?","choices":["A) Whether the test measures exactly what it claims to measure.","B) Whether the test results are perfectly consistent over time.","C) If the test practically fits the school's actual budget, time limits, and available trained staff.","D) If the test compares students to a national normative group."],"correct":2,"hint":"A good test that cannot be administered properly due to budget, time constraints, or lack of trained staff is not a practical choice for a school."},{"category":"Week 7 - The Skilled Helper","text":"What does it mean for a teacher to act as a \"Skilled Helper\"?","choices":["A) The teacher becomes a licensed therapist and provides medical diagnoses for the school.","B) The teacher observes, understands, and responds to students more effectively using counseling skills, while still maintaining their primary teaching role.","C) The teacher ignores all academic instruction to focus solely on students' feelings.","D) The teacher delegating all student conversations to the school principal."],"correct":1,"hint":"Becoming a skilled helper means gaining access to students' inner worlds and responding effectively, making the teacher more humane without turning them into a therapist."},{"category":"Week 8 - Core Helping Processes","text":"In the context of a helping conversation, what does the core process of \"receptivity\" mean?","choices":["A) The student safely expresses painful and traumatic emotions loudly.","B) The student becomes less defensive, feels emotionally safer, and is more open to influence and reflection.","C) The student feels understood at a deeper, empathic level.","D) The student immediately sets a concrete behavioral goal."],"correct":1,"hint":"Receptivity occurs when the student feels less threatened and becomes more willing to engage honestly in the helping process."},{"category":"Week 8 - Stage 2: Exploration","text":"What is the primary goal of the \"Exploration\" stage in the helping process?","choices":["A) To establish the initial, surface-level reason the student came for help.","B) To write down a specific, signed action plan.","C) To evaluate if the intervention worked over the last month.","D) To go deeper into what the student is really feeling, thinking, and what underlying issues connect to their first complaint."],"correct":3,"hint":"Once the main concern is clear, exploration goes deeper into feelings, meanings, and connections because the first concern is often only the surface layer."},{"category":"Week 8 - Stage 3: Understanding","text":"During the Understanding (Insight) stage, a teacher helps a student notice patterns and discrepancies. What is a helpful way to do this?","choices":["A) By arguing loudly with the student until they agree.","B) By giving them a pre-written list of advice to memorize.","C) By respectfully highlighting contradictions, questioning exaggerations, and connecting repeated behavioral patterns.","D) By ignoring everything the student says and changing the subject."],"correct":2,"hint":"Self-understanding grows when helpers connect repeated patterns, challenge exaggerations, and highlight contradictions carefully and respectfully."},{"category":"Week 8 - Stage 4: Action","text":"Why is \"Task Facilitation\" considered a critical part of the Action stage?","choices":["A) Because understanding a problem is entirely useless on its own.","B) Because insight without action often fades quickly, so students need help leaving with one realistic, concrete next step.","C) Because the school administration requires a signed behavioral contract for every single student meeting.","D) Because teachers must force students to do their homework immediately."],"correct":1,"hint":"Action turns insight into goals and concrete next steps, because merely realizing why you are struggling is usually not enough to create lasting change."},{"category":"Week 8 - Stage 5: Evaluation","text":"Which of the following is a highly useful question to ask a student during the Evaluation stage of helping?","choices":["A) \"Why didn't you do exactly what I told you to do?\"","B) \"What feels different now, and what still feels unresolved?\"","C) \"Are you ever going to learn how to behave?\"","D) \"Can you stop wasting my valuable teaching time?\""],"correct":1,"hint":"Evaluation reviews what has improved, what was learned, and whether more support is needed by asking reflective questions like \"What feels different now?\"."},{"category":"Week 9 - Suicide Risk","text":"Which of the following is considered a severe and immediate warning sign of suicide risk in a student?","choices":["A) A sudden shift from deep depression to elation and calmness.","B) Asking the teacher for extra homework assignments.","C) Complaining loudly about a strict physical education teacher.","D) Joining a new after-school sports team."],"correct":0,"hint":"A sudden shift from depression to elation, often alongside giving away possessions, is a serious warning sign that the student may have made a final decision."},{"category":"Week 9 - Handling High Risk","text":"If a teacher suspects a student is at high risk of suicide, what is the most important ethical rule regarding confidentiality?","choices":["A) The teacher must keep the secret absolutely if the student begs them to.","B) The teacher should immediately post the student's problem on the school's public website.","C) The teacher must take the risk seriously, NOT promise secrecy, and consult the appropriate school support system immediately.","D) The teacher should wait two weeks to see if the student feels better naturally."],"correct":2,"hint":"When suicide risk is suspected, caution is essential; teachers must not promise secrecy and must involve the appropriate school support system right away."},{"category":"Week 9 - Somatization","text":"A student frequently complains of severe stomachaches before math exams but has no clear medical diagnosis. What is a reasonable way for the teacher to approach this?","choices":["A) Accuse the student of lying to skip the test.","B) Immediately diagnose the student with a clinical anxiety disorder.","C) Rule out medical causes first, treat the symptom as potentially stress-related, monitor carefully, and consult with the counselor.","D) Expel the student for consistently missing class."],"correct":2,"hint":"In cases of unexplained physical symptoms, teachers should avoid amateur diagnosis but take the distress seriously as potential somatization or adjustment stress."},{"category":"Week 10 - Passive vs. Active Listening","text":"While passive listening (like eye contact and nodding) keeps a conversation open, what does \"active listening\" achieve?","choices":["A) It proves you are following accurately by restating or rewording the student's meaning.","B) It allows the teacher to grade papers while the student talks.","C) It immediately gives the student the perfect solution to their problem.","D) It interrupts the student to correct their factual errors."],"correct":0,"hint":"Active listening responds directly to what was said, showing understanding of both the words and the emotional experience behind them."},{"category":"Week 10 - What Good Listening Does NOT Do","text":"If a student suddenly says, \"This assignment is stupid,\" what is the most helpful listening response?","choices":["A) Rushing to defend the assignment and the curriculum immediately.","B) Scolding the student for using the word \"stupid\" in a classroom.","C) Delaying the impulse to explain long enough to hear the underlying frustration or confusion.","D) Telling the student to leave the room for disrespect."],"correct":2,"hint":"Good listening does not rush to defend, explain, or correct; it delays the impulse long enough to understand what the student actually means underneath the complaint."},{"category":"Week 10 - Empathic Resonance","text":"How does \"Empathic Resonance\" fundamentally differ from sympathy?","choices":["A) Sympathy means you feel nothing; empathy means you cry with the student.","B) Sympathy says \"I feel sorry for you,\" while empathy means entering the student's inner world enough to sense what the experience feels like from their side.","C) Sympathy is active listening; empathy is passive listening.","D) Empathy involves diagnosing the student's psychological condition."],"correct":1,"hint":"Empathy goes beyond feeling pity; it involves attending, listening, and emotional sensitivity coming together to deeply understand their perspective."},{"category":"Week 10 - Self-Disclosure","text":"When a teacher uses self-disclosure (sharing a brief personal story) during a helping conversation, what is the biggest risk indicating the intervention has gone wrong?","choices":["A) The student might tell other teachers.","B) The teacher's story becomes more central and takes focus away from the student's story.","C) The principal might overhear the conversation.","D) It automatically makes the student angry."],"correct":1,"hint":"Good self-disclosure should be concise and in the service of the student; if your story becomes the center of attention, the intervention has failed."},{"category":"Week 10 - Immediacy","text":"A teacher says, \"I notice that your voice became quieter when we mentioned your parents just now.\" What specific exploration skill is the teacher using?","choices":["A) Task facilitation","B) Summarizing","C) Immediacy","D) Direct advice giving"],"correct":2,"hint":"Immediacy is a special form of self-disclosure that shares what the helper feels or notices about the interaction in the exact present moment."},{"category":"Week 10 - Advice Giving","text":"Why is giving direct advice often considered a mistake in a helping conversation?","choices":["A) Because teachers do not know anything about real-life problems.","B) Because advice creates the illusion of action and can lead to dependency, teaching the student that someone else should decide for them.","C) Because advice takes too much time to formulate properly.","D) Because students universally hate all advice."],"correct":1,"hint":"Advice often serves the helper more than the student, and it risks creating dependency or blame if the advice fails."},{"category":"Week 11 - Fairness and Equity","text":"According to the principles of an inclusive classroom, what is the core difference between equality and equity?","choices":["A) Equality is giving everyone different tasks; equity is giving everyone the exact same task.","B) Equity means teaching students that fairness involves receiving necessary support based on individual needs, rather than receiving the exact same treatment as peers.","C) Equity and equality mean exactly the same thing in education.","D) Equity applies only to grading, while equality applies to classroom seating."],"correct":1,"hint":"Fairness must be paired with equity, which means providing students the specific, targeted supports they need to succeed, not just identical treatment."},{"category":"Week 11 - High Expectations","text":"How are \"High Expectations\" most effectively communicated to students?","choices":["A) By applying cold, relentless academic pressure without any emotional warmth.","B) Through a combination of challenge, optimism, support, and a clearly communicated belief that the student can succeed.","C) By ignoring students when they make mistakes so they don't feel bad.","D) By lowering passing grades so no one ever fails an exam."],"correct":1,"hint":"High expectations communicate faith in students' potential and require offering the targeted help they need to reach that potential."},{"category":"Week 11 - Group Work Types","text":"What is the primary purpose of conducting a \"Guidance Group\" in a school setting?","choices":["A) To provide deep clinical psychotherapy to students with severe trauma.","B) To teach practical life areas like study skills, communication, and career exploration that supplement standard academic education.","C) To isolate and punish students who consistently break school rules.","D) To prepare students for standardized math exams exclusively."],"correct":1,"hint":"Guidance groups are more didactic than deep process groups, focusing on helping students connect learning to practical life skills."},{"category":"Week 11 - Constructive Feedback","text":"For peer feedback in a classroom group setting to be truly useful and constructive, it must be:","choices":["A) Vague, general, and mostly flattering.","B) Specific, sensitive, supportive, and tied directly to observable behavior.","C) Harsh and humiliating so the student learns a lesson quickly.","D) Given entirely anonymously without the teacher's knowledge or guidance."],"correct":1,"hint":"Feedback is most effective when it is specific, phrased in a way the student can safely hear, and paired with a constructive suggestion."},{"category":"Week 12 - Open House","text":"During a school \"Open House\" event, what is the most important message a teacher should communicate to parents?","choices":["A) \"I am the strict authority here and you must obey my rules.\"","B) \"I know what I am doing, I care about your child, and we are on the same side.\"","C) \"Your children are currently failing my class and you need to fix it.\"","D) \"Please do not contact me during the year unless it is an absolute emergency.\""],"correct":1,"hint":"Parents need to see that the teacher enjoys teaching, has clear expectations, and wants open, cooperative communication."},{"category":"Week 12 - Phoning Home","text":"Why is making an early, positive phone call to a parent highly recommended for teachers?","choices":["A) It proves to the school administration that the teacher is working hard.","B) It builds goodwill and a foundation of trust before any behavioral or academic problems arise later in the year.","C) It is legally required by MONE during the first week of every school year.","D) It scares the student into behaving perfectly in class."],"correct":1,"hint":"Parents should not hear from teachers only when something is wrong; positive contact makes later problem-solving much easier and more collaborative."},{"category":"Week 12 - Conferences","text":"In a structured parent-teacher conference, what should happen during the \"Problem Solving\" phase?","choices":["A) The teacher lists every single mistake the student has ever made.","B) The parent blames the teacher for the student's low grades.","C) The focus moves from describing the problem to identifying obstacles, emphasizing areas of agreement, and deciding on concrete next steps.","D) The teacher asks the parent to leave the room so they can work alone."],"correct":2,"hint":"Problem solving means moving from description to shared goals, clarifying what needs to be done, who will help, and what practical strategies will be used."},{"category":"Week 12 - Difficult Parents","text":"If a parent becomes verbally abusive and their anger escalates during a meeting, what is the most professional response for the teacher?","choices":["A) Yell back to show authority and dominance.","B) Promise the parent whatever they want just to calm them down quickly.","C) Keep a calm voice, avoid arguing, state the desire for a productive meeting, and end/reschedule the meeting, inviting an administrator to mediate.","D) Ignore the parent entirely and walk out silently."],"correct":2,"hint":"Ending and rescheduling a meeting is more professional and safer than continuing a destructive, shouting conversation."},{"category":"Week 12 - Cultural Sensitivity","text":"Why must a teacher use multicultural sensitivity when interpreting a parent's quietness or lack of eye contact during a meeting?","choices":["A) Because these behaviors always mean the parent does not care about their child's education.","B) Because in some cultures, avoiding direct eye contact or remaining quiet is a sign of deep respect for the teacher's authority.","C) Because it proves the parent is hiding a secret about the child's behavior.","D) Because the teacher needs to refer the parent to a medical doctor immediately."],"correct":1,"hint":"Miscommunication often occurs when teachers interpret parent behavior without understanding that expectations around authority and communication are culturally shaped."},{"category":"Week 13 - Referral & Case Decision","text":"A student suddenly becomes quiet, tired, isolated, and their homework completion drops significantly. According to Turkish school systems, who is the most appropriate professional for the teacher to consult first to understand this emotional change?","choices":["A) The local police department.","B) The School Psychological Counselor (Rehberlik Servisi).","C) A private psychiatrist.","D) The Ministry of Health directly."],"correct":1,"hint":"The school counselor is the immediate internal expert to help assess emotional withdrawal before escalating to outside referrals or formal diagnosis."},{"category":"Week 13 - Referral Process","text":"When suggesting a referral to a student who needs more help, which phrase represents the best, most supportive approach?","choices":["A) \"You have a severe mental disorder and need a doctor immediately.\"","B) \"If you don't talk to the counselor, I will fail you in this class.\"","C) \"I will still support you as your teacher, but we need additional help because this is important.\"","D) \"I don't have time for this problem, go to the principal's office.\""],"correct":2,"hint":"Referral should feel like support, not rejection. The teacher communicates ongoing care while connecting the student with specialized help."},{"category":"Week 14 - Cognitive Distortions","text":"A teacher thinks to themselves, \"The principal should not treat me this way, and students must work harder.\" This rigid thinking pattern is known as:","choices":["A) Positive Reframing","B) Absolute Demands (Shoulds and Musts)","C) Overgeneralizing","D) Task Facilitation"],"correct":1,"hint":"Absolute demands create distress because they insist that other people and the world must behave exactly according to the person's preferences."},{"category":"Week 14 - Overgeneralizing","text":"If a teacher has one difficult class period and concludes, \"Because today went badly, everything is going badly, and I am a failing teacher,\" they are engaging in which cognitive distortion?","choices":["A) Overgeneralizing","B) Empathic resonance","C) Strategic intervention","D) Constructive self-talk"],"correct":0,"hint":"Overgeneralizing takes one specific event and turns it into a sweeping, permanent conclusion about the future or the self."},{"category":"Week 14 - Internalized Language","text":"Which of the following statements is an example of healthy \"Internalized Language\"?","choices":["A) \"That student made me so angry.\"","B) \"It's not my fault, I can't help feeling this way.\"","C) \"I chose to behave this way, and I have some influence over my reaction.\"","D) \"The principal's observation completely ruined my day.\""],"correct":2,"hint":"Internalized language focuses on how you interpret and respond, recognizing that you have control over your own reactions, rather than blaming outside forces."},{"category":"Week 14 - Reframing","text":"What is the primary purpose of \"Reframing\" a problem or a negative thought?","choices":["A) Pretending the problem does not exist at all.","B) Changing the way a problem is defined so that it becomes more understandable, less hopeless, and more workable.","C) Blaming the student entirely for the problem.","D) Repeating the exact same negative thought over and over."],"correct":1,"hint":"Reframing is changing the meaning of a situation so that constructive action becomes easier, rather than just pretending everything is fine."},{"category":"Week 5 - Multiple Disabilities","text":"Students classified as having \"multiple disabilities\" typically have intellectual disabilities combined with what other challenges?","choices":["A) Giftedness in advanced mathematics.","B) Purely behavioral defiance without any cognitive delay.","C) Sensory or physical impairments, requiring complex support needs and multiple specialists.","D) Perfect attendance records and high academic achievement."],"correct":2,"hint":"Multiple disabilities involve intellectual disabilities plus sensory or physical impairments, requiring coordinated support from multiple specialists."},{"category":"Week 12 - Conclusion of a Conference","text":"To ensure a parent-teacher conference leads to real change, how should it formally conclude?","choices":["A) By abruptly walking out when the school bell rings.","B) By asking the parent to sign a legally binding financial contract.","C) By summarizing the plan, clarifying responsibilities, and establishing a follow-up method (like an email or phone call).","D) By promising the parent that the student will magically get an \"A\" grade."],"correct":2,"hint":"A strong conclusion summarizes the plan, clarifies next steps, and establishes follow-up, which turns a single conversation into an ongoing partnership."}],
  ,"Mock Test 4":[{"category":"Week 2 - Career Counseling Origins","text":"Frank Parsons is known as the \"Father of Guidance.\" Which of the following is NOT one of the three core factors in his early career-choice framework?","choices":["A) Self-understanding of aptitudes and limits","B) Knowledge of work requirements and compensation","C) Medical history and psychiatric evaluation","D) The matching relationship between self and work information"],"correct":2,"hint":"Parsons' model focuses strictly on self-knowledge, career information, and the logical fit between them."},{"category":"Week 2 - Counseling in Türkiye","text":"According to the historical timeline of the profession in Türkiye, where did counseling services initially start and develop during the 1950s?","choices":["A) In military bases","B) In schools and education centers","C) In private corporate offices","D) In hospitals"],"correct":1,"hint":"Counseling in Turkey started in schools, with the first psychological services center opening in a primary school in Ankara in 1955."},{"category":"Week 2 - Professional Identity Conflicts","text":"What is a major source of professional identity conflict for counselors working in Türkiye's schools today?","choices":["A) Counselors are legally not allowed to work in public schools.","B) Different organizations and ministries use conflicting titles like \"psychological counselor,\" \"counselor,\" and \"guidance teacher.\"","C) MONE only hires clinical psychologists.","D) There are no university programs for counseling in Türkiye."],"correct":1,"hint":"Titles and boundaries are contested among MONE, TPCGA, and TPA, complicating professional identity and causing turf issues."},{"category":"Week 3 - MONE Regulation","text":"According to MONE regulations, what is the primary purpose of the \"e-Guidance system\" (e-Rehberlik)?","choices":["A) To publicly share students' disciplinary records with the community.","B) To provide online therapy sessions directly to parents.","C) To run programs within a plan, report activities, and allow authorized staff to monitor them electronically.","D) To replace all face-to-face classroom teaching with digital modules."],"correct":2,"hint":"The e-Guidance system is a digital platform used to run, report, and monitor school counseling programs efficiently."},{"category":"Week 3 - Program Balance","text":"When planning a comprehensive school counseling program, what is a common dilemma regarding the balance of services?","choices":["A) Choosing between academic instruction and physical education.","B) Balancing proactive prevention programming with reactive intervention and responsive services, given limited resources.","C) Deciding whether to only serve gifted students or only students with disabilities.","D) Deciding whether to eliminate the principal from the Advisory Committee entirely."],"correct":1,"hint":"Many programs overemphasize intervention at the expense of prevention, making it hard to balance systemic leadership with necessary responsive services."},{"category":"Week 4 - Special Education Referral","text":"Before making a formal referral to the Guidance and Research Center (RAM) for special education evaluation, what is the school required to do?","choices":["A) Expel the student immediately to protect the classroom environment.","B) Document the student's needs, current educational performance, and what adaptations have already been tried in class.","C) Wait for the student to fail three consecutive grade levels.","D) Force the parents to hire a private shadow teacher at their own expense."],"correct":1,"hint":"Documentation helps show exactly what the school has observed and what adjustments have been tried, which strengthens the referral with clear evidence."},{"category":"Week 4 - Response to Intervention","text":"In the Response to Intervention (RtI) model, what does \"Tier 1\" represent?","choices":["A) Intensive, highly individualized support for a single student.","B) Small group targeted intervention provided by a specialist.","C) High-quality, research-based instruction provided in the core general education classroom to all students.","D) Permanent placement in a separate special education school."],"correct":2,"hint":"RtI begins with high-quality teaching for all students at Tier 1, and moves to more intensive supports only if students do not respond adequately to that core instruction."},{"category":"Week 4 - Teacher Responsibilities in Special Ed","text":"Which of the following is considered a core responsibility of a general education teacher regarding special education?","choices":["A) Independently writing the entire Individualized Education Program (BEP) alone.","B) Formally diagnosing autism spectrum disorder.","C) Implementing evidence-based day-to-day instruction and communicating with parents about strengths and needs.","D) Administering standardized intelligence (IQ) tests."],"correct":2,"hint":"General educators identify needs, provide evidence-based instruction, and collaborate, while specialists manage formal diagnoses and specialized assessments."},{"category":"Week 5 - ASD Accommodations","text":"Students with Autism Spectrum Disorder (ASD) often experience stress triggered by unpredictable routines or sensory input. What is a highly effective classroom accommodation for them?","choices":["A) Using clear, consistent routines and visual schedules rather than purely verbal prompts.","B) Forcing them into loud, crowded spaces to build tolerance.","C) Removing all academic and behavioral expectations permanently.","D) Changing the daily schedule unexpectedly to teach them how to be flexible."],"correct":0,"hint":"Students with ASD often succeed best in structured, predictable environments supported by visual schedules and clear routines to reduce unnecessary ambiguity."},{"category":"Week 5 - ADHD Supports","text":"Which environmental support is most appropriate for a student with ADHD?","choices":["A) Seating them in the most visually stimulating part of the room next to the door.","B) Providing long, unchunked tasks that take an hour to complete.","C) Reducing distractions, establishing stable routines, and providing seating that improves focus.","D) Giving behavioral feedback only at the end of the semester."],"correct":2,"hint":"Students with ADHD do best in organized, low-distraction environments with stable routines and strategic seating that helps them monitor their attention."},{"category":"Week 5 - Gifted Students","text":"What does \"Curriculum Compacting\" mean in the context of supporting gifted and talented students?","choices":["A) Forcing students to repeat material they already know perfectly.","B) Removing already-mastered content so they can focus on more challenging, deeper material.","C) Grouping all gifted students into a separate school building.","D) Giving gifted students the exact same tasks as everyone else, but with less time to finish."],"correct":1,"hint":"Compacting removes already-mastered content, which is a key differentiation strategy to support advanced learners and prevent boredom."},{"category":"Week 5 - Culturally Diverse Students","text":"Why might a student from a culturally and linguistically diverse background experience difficulty in a traditional school setting?","choices":["A) Because they inherently lack cognitive ability.","B) Because of language barriers, cultural mismatch with school expectations, or inequitable schooling practices.","C) Because they naturally do not care about academic success.","D) Because special education labels are automatically required by law for all bilingual students."],"correct":1,"hint":"School expectations are culturally shaped, and misunderstanding a student's cultural background can lead to biased interpretations of their behavior and participation."},{"category":"Week 6 - Test Selection","text":"When a school is evaluating the \"administrative conditions\" of a potential standardized test, what are they primarily checking?","choices":["A) Whether the test measures exactly what it claims to measure.","B) Whether the test results are perfectly consistent over time.","C) If the test practically fits the school's actual budget, time limits, and available trained staff.","D) If the test compares students to a national normative group."],"correct":2,"hint":"A good test that cannot be administered properly due to budget, time constraints, or lack of trained staff is not a practical choice for a school."},{"category":"Week 7 - The Skilled Helper","text":"What does it mean for a teacher to act as a \"Skilled Helper\"?","choices":["A) The teacher becomes a licensed therapist and provides medical diagnoses for the school.","B) The teacher observes, understands, and responds to students more effectively using counseling skills, while still maintaining their primary teaching role.","C) The teacher ignores all academic instruction to focus solely on students' feelings.","D) The teacher delegating all student conversations to the school principal."],"correct":1,"hint":"Becoming a skilled helper means gaining access to students' inner worlds and responding effectively, making the teacher more humane without turning them into a therapist."},{"category":"Week 8 - Core Helping Processes","text":"In the context of a helping conversation, what does the core process of \"receptivity\" mean?","choices":["A) The student safely expresses painful and traumatic emotions loudly.","B) The student becomes less defensive, feels emotionally safer, and is more open to influence and reflection.","C) The student feels understood at a deeper, empathic level.","D) The student immediately sets a concrete behavioral goal."],"correct":1,"hint":"Receptivity occurs when the student feels less threatened and becomes more willing to engage honestly in the helping process."},{"category":"Week 8 - Stage 2: Exploration","text":"What is the primary goal of the \"Exploration\" stage in the helping process?","choices":["A) To establish the initial, surface-level reason the student came for help.","B) To write down a specific, signed action plan.","C) To evaluate if the intervention worked over the last month.","D) To go deeper into what the student is really feeling, thinking, and what underlying issues connect to their first complaint."],"correct":3,"hint":"Once the main concern is clear, exploration goes deeper into feelings, meanings, and connections because the first concern is often only the surface layer."},{"category":"Week 8 - Stage 3: Understanding","text":"During the Understanding (Insight) stage, a teacher helps a student notice patterns and discrepancies. What is a helpful way to do this?","choices":["A) By arguing loudly with the student until they agree.","B) By giving them a pre-written list of advice to memorize.","C) By respectfully highlighting contradictions, questioning exaggerations, and connecting repeated behavioral patterns.","D) By ignoring everything the student says and changing the subject."],"correct":2,"hint":"Self-understanding grows when helpers connect repeated patterns, challenge exaggerations, and highlight contradictions carefully and respectfully."},{"category":"Week 8 - Stage 4: Action","text":"Why is \"Task Facilitation\" considered a critical part of the Action stage?","choices":["A) Because understanding a problem is entirely useless on its own.","B) Because insight without action often fades quickly, so students need help leaving with one realistic, concrete next step.","C) Because the school administration requires a signed behavioral contract for every single student meeting.","D) Because teachers must force students to do their homework immediately."],"correct":1,"hint":"Action turns insight into goals and concrete next steps, because merely realizing why you are struggling is usually not enough to create lasting change."},{"category":"Week 8 - Stage 5: Evaluation","text":"Which of the following is a highly useful question to ask a student during the Evaluation stage of helping?","choices":["A) \"Why didn't you do exactly what I told you to do?\"","B) \"What feels different now, and what still feels unresolved?\"","C) \"Are you ever going to learn how to behave?\"","D) \"Can you stop wasting my valuable teaching time?\""],"correct":1,"hint":"Evaluation reviews what has improved, what was learned, and whether more support is needed by asking reflective questions like \"What feels different now?\"."},{"category":"Week 9 - Suicide Risk","text":"Which of the following is considered a severe and immediate warning sign of suicide risk in a student?","choices":["A) A sudden shift from deep depression to elation and calmness.","B) Asking the teacher for extra homework assignments.","C) Complaining loudly about a strict physical education teacher.","D) Joining a new after-school sports team."],"correct":0,"hint":"A sudden shift from depression to elation, often alongside giving away possessions, is a serious warning sign that the student may have made a final decision."},{"category":"Week 9 - Handling High Risk","text":"If a teacher suspects a student is at high risk of suicide, what is the most important ethical rule regarding confidentiality?","choices":["A) The teacher must keep the secret absolutely if the student begs them to.","B) The teacher should immediately post the student's problem on the school's public website.","C) The teacher must take the risk seriously, NOT promise secrecy, and consult the appropriate school support system immediately.","D) The teacher should wait two weeks to see if the student feels better naturally."],"correct":2,"hint":"When suicide risk is suspected, caution is essential; teachers must not promise secrecy and must involve the appropriate school support system right away."},{"category":"Week 9 - Somatization","text":"A student frequently complains of severe stomachaches before math exams but has no clear medical diagnosis. What is a reasonable way for the teacher to approach this?","choices":["A) Accuse the student of lying to skip the test.","B) Immediately diagnose the student with a clinical anxiety disorder.","C) Rule out medical causes first, treat the symptom as potentially stress-related, monitor carefully, and consult with the counselor.","D) Expel the student for consistently missing class."],"correct":2,"hint":"In cases of unexplained physical symptoms, teachers should avoid amateur diagnosis but take the distress seriously as potential somatization or adjustment stress."},{"category":"Week 10 - Passive vs. Active Listening","text":"While passive listening (like eye contact and nodding) keeps a conversation open, what does \"active listening\" achieve?","choices":["A) It proves you are following accurately by restating or rewording the student's meaning.","B) It allows the teacher to grade papers while the student talks.","C) It immediately gives the student the perfect solution to their problem.","D) It interrupts the student to correct their factual errors."],"correct":0,"hint":"Active listening responds directly to what was said, showing understanding of both the words and the emotional experience behind them."},{"category":"Week 10 - What Good Listening Does NOT Do","text":"If a student suddenly says, \"This assignment is stupid,\" what is the most helpful listening response?","choices":["A) Rushing to defend the assignment and the curriculum immediately.","B) Scolding the student for using the word \"stupid\" in a classroom.","C) Delaying the impulse to explain long enough to hear the underlying frustration or confusion.","D) Telling the student to leave the room for disrespect."],"correct":2,"hint":"Good listening does not rush to defend, explain, or correct; it delays the impulse long enough to understand what the student actually means underneath the complaint."},{"category":"Week 10 - Empathic Resonance","text":"How does \"Empathic Resonance\" fundamentally differ from sympathy?","choices":["A) Sympathy means you feel nothing; empathy means you cry with the student.","B) Sympathy says \"I feel sorry for you,\" while empathy means entering the student's inner world enough to sense what the experience feels like from their side.","C) Sympathy is active listening; empathy is passive listening.","D) Empathy involves diagnosing the student's psychological condition."],"correct":1,"hint":"Empathy goes beyond feeling pity; it involves attending, listening, and emotional sensitivity coming together to deeply understand their perspective."},{"category":"Week 10 - Self-Disclosure","text":"When a teacher uses self-disclosure (sharing a brief personal story) during a helping conversation, what is the biggest risk indicating the intervention has gone wrong?","choices":["A) The student might tell other teachers.","B) The teacher's story becomes more central and takes focus away from the student's story.","C) The principal might overhear the conversation.","D) It automatically makes the student angry."],"correct":1,"hint":"Good self-disclosure should be concise and in the service of the student; if your story becomes the center of attention, the intervention has failed."},{"category":"Week 10 - Immediacy","text":"A teacher says, \"I notice that your voice became quieter when we mentioned your parents just now.\" What specific exploration skill is the teacher using?","choices":["A) Task facilitation","B) Summarizing","C) Immediacy","D) Direct advice giving"],"correct":2,"hint":"Immediacy is a special form of self-disclosure that shares what the helper feels or notices about the interaction in the exact present moment."},{"category":"Week 10 - Advice Giving","text":"Why is giving direct advice often considered a mistake in a helping conversation?","choices":["A) Because teachers do not know anything about real-life problems.","B) Because advice creates the illusion of action and can lead to dependency, teaching the student that someone else should decide for them.","C) Because advice takes too much time to formulate properly.","D) Because students universally hate all advice."],"correct":1,"hint":"Advice often serves the helper more than the student, and it risks creating dependency or blame if the advice fails."},{"category":"Week 11 - Fairness and Equity","text":"According to the principles of an inclusive classroom, what is the core difference between equality and equity?","choices":["A) Equality is giving everyone different tasks; equity is giving everyone the exact same task.","B) Equity means teaching students that fairness involves receiving necessary support based on individual needs, rather than receiving the exact same treatment as peers.","C) Equity and equality mean exactly the same thing in education.","D) Equity applies only to grading, while equality applies to classroom seating."],"correct":1,"hint":"Fairness must be paired with equity, which means providing students the specific, targeted supports they need to succeed, not just identical treatment."},{"category":"Week 11 - High Expectations","text":"How are \"High Expectations\" most effectively communicated to students?","choices":["A) By applying cold, relentless academic pressure without any emotional warmth.","B) Through a combination of challenge, optimism, support, and a clearly communicated belief that the student can succeed.","C) By ignoring students when they make mistakes so they don't feel bad.","D) By lowering passing grades so no one ever fails an exam."],"correct":1,"hint":"High expectations communicate faith in students' potential and require offering the targeted help they need to reach that potential."},{"category":"Week 11 - Group Work Types","text":"What is the primary purpose of conducting a \"Guidance Group\" in a school setting?","choices":["A) To provide deep clinical psychotherapy to students with severe trauma.","B) To teach practical life areas like study skills, communication, and career exploration that supplement standard academic education.","C) To isolate and punish students who consistently break school rules.","D) To prepare students for standardized math exams exclusively."],"correct":1,"hint":"Guidance groups are more didactic than deep process groups, focusing on helping students connect learning to practical life skills."},{"category":"Week 11 - Constructive Feedback","text":"For peer feedback in a classroom group setting to be truly useful and constructive, it must be:","choices":["A) Vague, general, and mostly flattering.","B) Specific, sensitive, supportive, and tied directly to observable behavior.","C) Harsh and humiliating so the student learns a lesson quickly.","D) Given entirely anonymously without the teacher's knowledge or guidance."],"correct":1,"hint":"Feedback is most effective when it is specific, phrased in a way the student can safely hear, and paired with a constructive suggestion."},{"category":"Week 12 - Open House","text":"During a school \"Open House\" event, what is the most important message a teacher should communicate to parents?","choices":["A) \"I am the strict authority here and you must obey my rules.\"","B) \"I know what I am doing, I care about your child, and we are on the same side.\"","C) \"Your children are currently failing my class and you need to fix it.\"","D) \"Please do not contact me during the year unless it is an absolute emergency.\""],"correct":1,"hint":"Parents need to see that the teacher enjoys teaching, has clear expectations, and wants open, cooperative communication."},{"category":"Week 12 - Phoning Home","text":"Why is making an early, positive phone call to a parent highly recommended for teachers?","choices":["A) It proves to the school administration that the teacher is working hard.","B) It builds goodwill and a foundation of trust before any behavioral or academic problems arise later in the year.","C) It is legally required by MONE during the first week of every school year.","D) It scares the student into behaving perfectly in class."],"correct":1,"hint":"Parents should not hear from teachers only when something is wrong; positive contact makes later problem-solving much easier and more collaborative."},{"category":"Week 12 - Conferences","text":"In a structured parent-teacher conference, what should happen during the \"Problem Solving\" phase?","choices":["A) The teacher lists every single mistake the student has ever made.","B) The parent blames the teacher for the student's low grades.","C) The focus moves from describing the problem to identifying obstacles, emphasizing areas of agreement, and deciding on concrete next steps.","D) The teacher asks the parent to leave the room so they can work alone."],"correct":2,"hint":"Problem solving means moving from description to shared goals, clarifying what needs to be done, who will help, and what practical strategies will be used."},{"category":"Week 12 - Difficult Parents","text":"If a parent becomes verbally abusive and their anger escalates during a meeting, what is the most professional response for the teacher?","choices":["A) Yell back to show authority and dominance.","B) Promise the parent whatever they want just to calm them down quickly.","C) Keep a calm voice, avoid arguing, state the desire for a productive meeting, and end/reschedule the meeting, inviting an administrator to mediate.","D) Ignore the parent entirely and walk out silently."],"correct":2,"hint":"Ending and rescheduling a meeting is more professional and safer than continuing a destructive, shouting conversation."},{"category":"Week 12 - Cultural Sensitivity","text":"Why must a teacher use multicultural sensitivity when interpreting a parent's quietness or lack of eye contact during a meeting?","choices":["A) Because these behaviors always mean the parent does not care about their child's education.","B) Because in some cultures, avoiding direct eye contact or remaining quiet is a sign of deep respect for the teacher's authority.","C) Because it proves the parent is hiding a secret about the child's behavior.","D) Because the teacher needs to refer the parent to a medical doctor immediately."],"correct":1,"hint":"Miscommunication often occurs when teachers interpret parent behavior without understanding that expectations around authority and communication are culturally shaped."},{"category":"Week 13 - Referral & Case Decision","text":"A student suddenly becomes quiet, tired, isolated, and their homework completion drops significantly. According to Turkish school systems, who is the most appropriate professional for the teacher to consult first to understand this emotional change?","choices":["A) The local police department.","B) The School Psychological Counselor (Rehberlik Servisi).","C) A private psychiatrist.","D) The Ministry of Health directly."],"correct":1,"hint":"The school counselor is the immediate internal expert to help assess emotional withdrawal before escalating to outside referrals or formal diagnosis."},{"category":"Week 13 - Referral Process","text":"When suggesting a referral to a student who needs more help, which phrase represents the best, most supportive approach?","choices":["A) \"You have a severe mental disorder and need a doctor immediately.\"","B) \"If you don't talk to the counselor, I will fail you in this class.\"","C) \"I will still support you as your teacher, but we need additional help because this is important.\"","D) \"I don't have time for this problem, go to the principal's office.\""],"correct":2,"hint":"Referral should feel like support, not rejection. The teacher communicates ongoing care while connecting the student with specialized help."},{"category":"Week 14 - Cognitive Distortions","text":"A teacher thinks to themselves, \"The principal should not treat me this way, and students must work harder.\" This rigid thinking pattern is known as:","choices":["A) Positive Reframing","B) Absolute Demands (Shoulds and Musts)","C) Overgeneralizing","D) Task Facilitation"],"correct":1,"hint":"Absolute demands create distress because they insist that other people and the world must behave exactly according to the person's preferences."},{"category":"Week 14 - Overgeneralizing","text":"If a teacher has one difficult class period and concludes, \"Because today went badly, everything is going badly, and I am a failing teacher,\" they are engaging in which cognitive distortion?","choices":["A) Overgeneralizing","B) Empathic resonance","C) Strategic intervention","D) Constructive self-talk"],"correct":0,"hint":"Overgeneralizing takes one specific event and turns it into a sweeping, permanent conclusion about the future or the self."},{"category":"Week 14 - Internalized Language","text":"Which of the following statements is an example of healthy \"Internalized Language\"?","choices":["A) \"That student made me so angry.\"","B) \"It's not my fault, I can't help feeling this way.\"","C) \"I chose to behave this way, and I have some influence over my reaction.\"","D) \"The principal's observation completely ruined my day.\""],"correct":2,"hint":"Internalized language focuses on how you interpret and respond, recognizing that you have control over your own reactions, rather than blaming outside forces."},{"category":"Week 14 - Reframing","text":"What is the primary purpose of \"Reframing\" a problem or a negative thought?","choices":["A) Pretending the problem does not exist at all.","B) Changing the way a problem is defined so that it becomes more understandable, less hopeless, and more workable.","C) Blaming the student entirely for the problem.","D) Repeating the exact same negative thought over and over."],"correct":1,"hint":"Reframing is changing the meaning of a situation so that constructive action becomes easier, rather than just pretending everything is fine."},{"category":"Week 5 - Multiple Disabilities","text":"Students classified as having \"multiple disabilities\" typically have intellectual disabilities combined with what other challenges?","choices":["A) Giftedness in advanced mathematics.","B) Purely behavioral defiance without any cognitive delay.","C) Sensory or physical impairments, requiring complex support needs and multiple specialists.","D) Perfect attendance records and high academic achievement."],"correct":2,"hint":"Multiple disabilities involve intellectual disabilities plus sensory or physical impairments, requiring coordinated support from multiple specialists."},{"category":"Week 12 - Conclusion of a Conference","text":"To ensure a parent-teacher conference leads to real change, how should it formally conclude?","choices":["A) By abruptly walking out when the school bell rings.","B) By asking the parent to sign a legally binding financial contract.","C) By summarizing the plan, clarifying responsibilities, and establishing a follow-up method (like an email or phone call).","D) By promising the parent that the student will magically get an \"A\" grade."],"correct":2,"hint":"A strong conclusion summarizes the plan, clarifies next steps, and establishes follow-up, which turns a single conversation into an ongoing partnership."}]

const KEYS = ['A', 'B', 'C', 'D'];
let activeTestKey = Object.keys(allTests)[0]; // Varsayılan ilk test
let questions = allTests[activeTestKey];
let state = loadState(activeTestKey);

// ─── INIT TABS ───────────────────────────────────────────────
function initTabs() {
  const tabsContainer = document.getElementById('testTabs');
  tabsContainer.innerHTML = '';
  
  Object.keys(allTests).forEach(testName => {
    const btn = document.createElement('button');
    btn.className = `test-tab-btn ${testName === activeTestKey ? 'active' : ''}`;
    btn.textContent = testName;
    btn.onclick = () => switchTest(testName);
    tabsContainer.appendChild(btn);
  });
}

function switchTest(testName) {
  if(activeTestKey === testName) return;
  activeTestKey = testName;
  questions = allTests[activeTestKey];
  state = loadState(activeTestKey);
  initTabs(); // Active class güncellemesi için
  render();
}

// ─── STATE MANAGEMENT ────────────────────────────────────────
function getStorageKey(testName) {
  return `quiz_arena_${testName.replace(/\s+/g, '_')}`;
}

function loadState(testName) {
  try {
    const raw = localStorage.getItem(getStorageKey(testName));
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { current: 0, answers: {}, finished: false };
}

function saveState() {
  localStorage.setItem(getStorageKey(activeTestKey), JSON.stringify(state));
}

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  const total = questions.length;
  const answeredKeys = Object.keys(state.answers).filter(k => state.answers[k] !== undefined);
  const answeredCount = answeredKeys.length;
  const pct = Math.round((answeredCount / total) * 100) || 0;

  let correctCount = 0;
  let wrongCount = 0;

  answeredKeys.forEach(k => {
    if (state.answers[k] === questions[k].correct) correctCount++;
    else wrongCount++;
  });

  // Header & Stats
  document.getElementById('headerMeta').textContent = `${answeredCount}/${total} tamamlandı`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statPercent').textContent = pct + '%';

  // Optic grid
  const grid = document.getElementById('opticGrid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'optic-btn';
    const hasAnswer = state.answers[i] !== undefined;
    
    if (hasAnswer) {
      if (state.answers[i] === q.correct) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('incorrect');
      }
    }
    if (i === state.current && !state.finished) btn.classList.add('active');
    
    btn.innerHTML = `<span>${i + 1}</span>${hasAnswer ? `<span class="choice-badge">${KEYS[state.answers[i]]}</span>` : ''}`;
    btn.onclick = () => { if(state.finished) return; jumpTo(i); };
    grid.appendChild(btn);
  });

  // Finish screen vs question
  if (state.finished) {
    document.getElementById('questionCard').style.display = 'none';
    document.getElementById('navBar').style.display = 'none';
    document.getElementById('finishScreen').classList.add('show');
    document.getElementById('finishScore').textContent = `${correctCount}/${total}`;
    document.getElementById('finishScoreLabel').textContent = `Doğru cevap sayısı`;
    return;
  }

  document.getElementById('questionCard').style.display = 'flex';
  document.getElementById('navBar').style.display = 'flex';
  document.getElementById('finishScreen').classList.remove('show');

  const q = questions[state.current];
  document.getElementById('qNum').textContent = state.current + 1;
  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('questionText').textContent = q.text;

  // Choices
  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';
  q.choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    
    const isSelected = state.answers[state.current] === i;
    if (isSelected) {
      btn.classList.add('selected');
      if (i === q.correct) {
        btn.classList.add('correct-choice');
      } else {
        btn.classList.add('incorrect-choice');
      }
    }
    
    const cleanText = text.match(/^[A-Z]\)\s(.*)/) ? text.match(/^[A-Z]\)\s(.*)/)[1] : text;
    btn.innerHTML = `<span class="choice-key">${KEYS[i]}</span><span class="choice-text">${cleanText}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  // Nav
  document.getElementById('prevBtn').disabled = state.current === 0;
  const isLast = state.current === total - 1;
  document.getElementById('nextBtn').textContent = isLast ? 'Bitir ✓' : 'Sonraki →';
  document.getElementById('navCounter').textContent = `${state.current + 1} / ${total}`;
}

// ─── ACTIONS ─────────────────────────────────────────────────
function selectAnswer(i) {
  state.answers[state.current] = i;
  saveState();
  render();
}

function navigate(dir) {
  const next = state.current + dir;
  if (next < 0) return;
  if (next >= questions.length) {
    state.finished = true;
    saveState();
    render();
    return;
  }
  state.current = next;
  saveState();
  render();
  document.querySelector('.main').scrollTop = 0;
}

function jumpTo(i) {
  state.current = i;
  saveState();
  render();
}

function resetAll() {
  if (!state.finished && !confirm('Bu testteki tüm cevapların silinecek. Emin misin?')) return;
  state = { current: 0, answers: {}, finished: false };
  localStorage.removeItem(getStorageKey(activeTestKey));
  render();
}

// ─── HINT ────────────────────────────────────────────────────
function showHint() {
  document.getElementById('hintText').textContent = questions[state.current].hint;
  document.getElementById('hintModal').classList.add('show');
}
function closeHint(e) { if (e.target === document.getElementById('hintModal')) closeHintDirect(); }
function closeHintDirect() { document.getElementById('hintModal').classList.remove('show'); }

// ─── KEYBOARD ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state.finished) return;
  if (e.key === 'Escape') closeHintDirect();
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  const map = { a:0, b:1, c:2, d:3 };
  if (map[e.key.toLowerCase()] !== undefined) selectAnswer(map[e.key.toLowerCase()]);
});

// ─── START ───────────────────────────────────────────────────
initTabs();
render();
</script>
</body>
</html>
